name: IndexNow ping + schema validation

# Runs after every push to main. Waits for Vercel to redeploy, validates
# the JSON-LD graph is live with the expected shape, then pings IndexNow
# (Bing + Yandex re-crawl immediately, free).

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy
        run: sleep 90

      - name: Validate JSON-LD is live with expected shape
        shell: bash
        run: |
          python3 - <<'PY'
          import json, re, sys, urllib.request

          html = urllib.request.urlopen('https://career-ops.org/').read().decode()
          matches = re.findall(
              r'<script[^>]*application/ld\+json[^>]*>([\s\S]*?)</script>',
              html,
          )
          if not matches:
              sys.exit('FAIL: no JSON-LD <script> found in HTML')

          d = json.loads(matches[0])
          graph = d.get('@graph', [])
          types = [n.get('@type') for n in graph]
          for t in ('WebSite', 'SoftwareSourceCode'):
              if t not in types:
                  sys.exit(f'FAIL: missing @type {t}')

          for n in graph:
              if n.get('@type') == 'SoftwareSourceCode':
                  creator_id = (n.get('creator') or {}).get('@id')
                  if creator_id != 'https://santifer.io/#person':
                      sys.exit(f'FAIL: SoftwareSourceCode.creator.@id = {creator_id!r}')
                  if not n.get('interactionStatistic'):
                      sys.exit('FAIL: SoftwareSourceCode.interactionStatistic missing')

          print('OK: JSON-LD live with WebSite + SoftwareSourceCode + creator @id + interactionStatistic')
          PY

      - name: Ping IndexNow from live sitemap (Bing, Yandex)
        shell: bash
        run: |
          python3 - <<'PY'
          import json, re, urllib.request

          KEY = "1befaf1616dd4dc08b51ecb5ec601059"

          # Derive the URL list from the live sitemap so it can never drift
          # out of sync as pages are added/removed (the old hardcoded list
          # had decayed to pinging only 4 of the 14 mode pages).
          sitemap = urllib.request.urlopen(
              'https://career-ops.org/sitemap.xml', timeout=30
          ).read().decode()
          urls = re.findall(r'<loc>\s*([^<\s]+)\s*</loc>', sitemap)

          # The two LLM surfaces are intentionally not in the sitemap; submit
          # them explicitly so AI crawlers re-fetch them on every deploy.
          for extra in (
              'https://career-ops.org/llms.txt',
              'https://career-ops.org/llms-full.txt',
          ):
              if extra not in urls:
                  urls.append(extra)

          if not urls:
              raise SystemExit('FAIL: no <loc> URLs parsed from sitemap.xml')

          payload = json.dumps({
              "host": "career-ops.org",
              "key": KEY,
              "keyLocation": f"https://career-ops.org/{KEY}.txt",
              "urlList": urls,
          }).encode()

          req = urllib.request.Request(
              'https://api.indexnow.org/IndexNow',
              data=payload,
              headers={'Content-Type': 'application/json'},
          )
          resp = urllib.request.urlopen(req, timeout=30)
          print(f"OK: IndexNow notified with {len(urls)} URLs (HTTP {resp.status})")
          PY
